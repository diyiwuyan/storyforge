appId: com.storyforge.app
productName: StoryForge

directories:
  output: release

# 打包文件规则
files:
  - dist/**/*
  - electron/**/*
  - "!electron/**/*.ts"
  - "!electron/**/*.map"
  - "!electron/**/*.tsbuildinfo"
  - package.json

# asar 打包（加速加载、保护源码）
asar: true

# 不强制代码签名（没有证书时自动跳过签名）
forceCodeSigning: false

# ---- Windows ----
win:
  target:
    - nsis
  # 不设置 certificateFile / certificateSubjectName / sign
  # 这样 cscInfo 为 null 且 sign 为 null，electron-builder 自动跳过签名

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: StoryForge

# ---- macOS ----
mac:
  target:
    - dmg

# ---- 自动更新发布配置 ----
# 使用 GitHub Release 作为更新源
# electron-updater 会自动检查 https://github.com/{owner}/{repo}/releases/latest
# 发布步骤：
#   1. npm run build 生成 release/ 目录
#   2. gh release create vX.Y.Z 并上传 .exe + latest.yml + .blockmap
#   3. 应用启动后自动检查是否有新版本
publish:
  provider: github
  owner: diyiwuyan
  repo: storyforge
